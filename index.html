<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>iOS 27 Beta 模擬器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="iphone-screen" id="main-sim">
    
    <div id="boot-screen">
      <svg class="apple-logo" viewBox="0 0 170 170">
        <path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.24 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69.0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.18-14.34-3.18-4.24 0-8.99 1.06-14.23 3.18-5.23 2.13-9.67 3.18-13.32 3.18-5.27-.12-10.12-2.36-14.54-6.71-3.03-2.88-6.9-7.53-11.6-13.94-5.94-8.12-10.42-17.53-13.43-28.24-3.06-10.82-4.61-21.35-4.65-31.59-.06-14.65 4.06-26.41 12.37-35.29 5.51-5.94 11.96-9.15 19.34-9.64 4.54-.36 9.77 1.09 15.66 4.35 5.89 3.26 9.87 4.91 11.94 4.91 1.94 0 6.06-1.74 12.35-5.23 6.35-3.47 11.83-5.06 16.42-4.76 11.75.47 21.05 4.88 27.88 13.23-10.3 6.24-15.35 15.35-15.17 27.35.18 10.94 4.3 19.82 12.35 26.65 1.58 1.29 3.35 2.47 5.3 3.53-1.66 4.82-3.6 9.53-5.83 14.12zM113.11 32.18c-5.18 2.24-10.65 3.41-16.41 3.53-1.06-10.76 2.82-19.82 11.64-27.17 4.94-4.12 10.47-6.29 16.59-6.53.88 10.82-2.71 20.76-10.64 28.05-3.36 3.12-7.06 5.12-11.18 6.12z"/>
      </svg>
      <div class="progress-track"><div class="progress-bar" id="boot-progress"></div></div>
    </div>

    <div id="home-screen">
      
      <div id="dynamic-island" class="glass-panel">準備就緒</div>

      <div class="search-bar glass-panel clickable" data-name="App 資料庫">
        🔍 App 資料庫
      </div>

      <div class="app-grid">
        <div class="widget-2x2 glass-panel clickable" data-name="行事曆">
          <div class="calendar-date" id="widget-date">20</div>
          <div class="calendar-day" id="widget-day">週六</div>
        </div>

        <div class="widget-2x2 glass-panel clickable photo-widget" data-name="照片回憶">
           <img src="https://images.unsplash.com/photo-1604871000636-074fa5117945?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" alt="photo">
        </div>

        <div class="app-icon glass-panel clickable" data-name="YouTube">▶️<br>影片</div>
        <div class="app-icon glass-panel clickable" data-name="Spotify">🎵<br>音樂</div>
        <div class="app-icon glass-panel clickable" data-name="設定">⚙️<br>設定</div>
        <div class="app-icon glass-panel clickable" data-name="地圖">🗺️<br>地圖</div>

        <div class="widget-4x2 glass-panel clickable" data-name="天氣與時鐘">
           <div style="font-size: 28px; font-weight: 300;">信義區 28°C</div>
           <div style="font-size: 14px; opacity: 0.7;">晴時多雲 · 降雨機率 10%</div>
        </div>
      </div>

      <div class="dock glass-panel">
        <div class="app-icon glass-panel clickable" data-name="電話">📞</div>
        <div class="app-icon glass-panel clickable" data-name="Safari">🧭</div>
        <div class="app-icon glass-panel clickable" data-name="訊息">💬</div>
        <div class="app-icon glass-panel clickable" data-name="相機">📷</div>
      </div>
    </div>

    <div id="lock-screen-container">
      <div class="glass-panel">
        <div class="date" id="dateDisplay">載入中...</div>
        <h1 class="time" id="clock">--:--</h1>
      </div>
      <div class="swipe-text" id="swipe-text">向上滑動來解鎖</div>
      <div class="home-indicator-area" id="home-area">
        <div class="home-indicator"></div>
      </div>
    </div>

  </div>
  
  <script src="script.js"></script>
</body>
</html>
