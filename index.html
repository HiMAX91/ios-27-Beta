<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>iOS 27 Beta 模擬器</title>
  <style>
    /* --- 核心設定 (修復下方被切掉的 Bug) --- */
    body, html { margin: 0; padding: 0; height: 100vh; height: 100dvh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; user-select: none; -webkit-user-select: none; background-color: black; touch-action: none; }
    .iphone-screen { position: relative; width: 100vw; height: 100dvh; overflow: hidden; background: radial-gradient(circle at 50% 0%, #e2d1c3 0%, #b8a698 40%, #756a64 100%); }

    /* --- 開機畫面 --- */
    #boot-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: black; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
    .apple-logo { width: 80px; height: 80px; margin-bottom: 40px; fill: white; }
    .progress-track { width: 150px; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: white; border-radius: 2px; transition: width 2.5s cubic-bezier(0.4, 0, 0.2, 1); }

    /* --- 鎖定畫面 --- */
    #lock-screen-container { position: absolute; top: 0; left: 0; width: 100%; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 10vh; z-index: 100; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease; cursor: grab; }
    .time { font-size: 95px; font-weight: 600; margin: 0; letter-spacing: -2px; color: rgba(255, 255, 255, 0.9); pointer-events: none; }
    .date { font-size: 20px; font-weight: 500; opacity: 0.9; color: white; margin-bottom: -10px; pointer-events: none; }
    .swipe-text { position: absolute; bottom: calc(65px + env(safe-area-inset-bottom)); color: white; font-size: 14px; opacity: 0.6; animation: pulse 2s infinite; pointer-events: none; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    .home-indicator-area { position: absolute; bottom: 0; width: 100%; height: calc(80px + env(safe-area-inset-bottom)); display: flex; justify-content: center; align-items: flex-end; padding-bottom: calc(15px + env(safe-area-inset-bottom)); cursor: grab; z-index: 150; touch-action: none; }
    .home-indicator { width: 35%; height: 5px; background: white; border-radius: 10px; opacity: 0.8; }

    /* --- 主畫面系統 --- */
    #home-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100dvh; z-index: 10; opacity: 0; transform: scale(0.9); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); box-sizing: border-box; }
    .carousel { display: flex; flex-grow: 1; width: 100%; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; scrollbar-width: none; margin-top: env(safe-area-inset-top); }
    .carousel::-webkit-scrollbar { display: none; }
    .page { min-width: 100vw; padding: 40px 20px 0 20px; box-sizing: border-box; display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 75px; gap: 15px; align-content: start; scroll-snap-align: start; }
    .page-dots { display: flex; justify-content: center; align-items: center; height: 15px; margin: 5px 0; gap: 8px; flex-shrink: 0; }
    .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; transition: 0.3s; }
    .dot.active { background: rgba(255,255,255,0.9); width: 10px; height: 10px; }
    
    /* 🌟 Liquid Glass UI (無藍色偏、純粹透明) */
    .glass-panel { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; color: white; text-align: center; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
    
    /* 修復 Dock 被切掉的佈局 */
    .dock-container { padding: 0 20px 20px 20px; padding-bottom: calc(25px + env(safe-area-inset-bottom)); flex-shrink: 0; }
    .dock { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 35px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1); display: flex; flex-direction: row; justify-content: space-around; align-items: center; padding: 15px; }
    .dock .app-icon { font-size: 11px; display: flex; flex-direction: column; align-items: center; }
    .dock .app-icon span { font-size: 32px; margin-bottom: 0; }

    /* 元件尺寸與排版 */
    .widget-2x2 { grid-column: span 2; grid-row: span 2; border-radius: 30px; }
    .widget-4x2 { grid-column: span 4; grid-row: span 2; border-radius: 30px; align-items: flex-start; padding: 20px !important; box-sizing: border-box; }
    .app-icon { font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 500; }
    .app-icon span { font-size: 32px; margin-bottom: 5px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    .search-bar { grid-column: span 4; grid-row: span 1; border-radius: 20px; flex-direction: row; font-size: 15px; color: rgba(255,255,255,0.9); font-weight: 500; }
    .photo-widget img { width: 100%; height: 100%; object-fit: cover; }
    .calendar-date { font-size: 45px; font-weight: 300; }
    .calendar-day { font-size: 14px; font-weight: 600; color: #ff3b30; }
    .clickable { cursor: pointer; transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.15s ease; }
    .clickable:active { transform: scale(0.85) !important; opacity: 0.7; }

    /* --- 🌟 升級版 App 運行層 --- */
    #app-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; background: #fff; z-index: 200; display: flex; flex-direction: column; transform: translateY(100dvh) scale(0.9); opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 40px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    #app-header { padding: calc(40px + env(safe-area-inset-top)) 20px 15px 20px; background: rgba(250, 250, 250, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; justify-content: center; align-items: center; position: relative; z-index: 85; }
    #app-title { font-size: 17px; font-weight: 600; color: black; margin: 0; letter-spacing: -0.5px; }
    #app-content { flex-grow: 1; overflow-y: auto; background: #f2f2f7; scrollbar-width: none; }
    #app-content::-webkit-scrollbar { display: none; }
    #app-home-area { z-index: 250; position: absolute; bottom: 0; width: 100%; height: calc(50px + env(safe-area-inset-bottom)); display: flex; justify-content: center; align-items: flex-end; padding-bottom: calc(15px + env(safe-area-inset-bottom)); touch-action: none; cursor: grab; }
    #app-home-area .home-indicator { background: black; width: 40%; height: 5px; border-radius: 10px; }

    /* 各種 App 內部的精緻樣式 */
    .app-card { background: white; border-radius: 18px; padding: 15px; margin: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .chat-bubble { max-width: 70%; padding: 12px 16px; border-radius: 20px; margin-bottom: 15px; font-size: 15px; line-height: 1.4; }
    .chat-left { background: #e9e9eb; color: black; align-self: flex-start; border-bottom-left-radius: 5px; }
    .chat-right { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
  </style>
</head>
<body>
  <div class="iphone-screen">
    
    <div id="boot-screen">
      <svg class="apple-logo" viewBox="0 0 170 170"><path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.24 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69.0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.18-14.34-3.18-4.24 0-8.99 1.06-14.23 3.18-5.23 2.13-9.67 3.18-13.32 3.18-5.27-.12-10.12-2.36-14.54-6.71-3.03-2.88-6.9-7.53-11.6-13.94-5.94-8.12-10.42-17.53-13.43-28.24-3.06-10.82-4.61-21.35-4.65-31.59-.06-14.65 4.06-26.41 12.37-35.29 5.51-5.94 11.96-9.15 19.34-9.64 4.54-.36 9.77 1.09 15.66 4.35 5.89 3.26 9.87 4.91 11.94 4.91 1.94 0 6.06-1.74 12.35-5.23 6.35-3.47 11.83-5.06 16.42-4.76 11.75.47 21.05 4.88 27.88 13.23-10.3 6.24-15.35 15.35-15.17 27.35.18 10.94 4.3 19.82 12.35 26.65 1.58 1.29 3.35 2.47 5.3 3.53-1.66 4.82-3.6 9.53-5.83 14.12zM113.11 32.18c-5.18 2.24-10.65 3.41-16.41 3.53-1.06-10.76 2.82-19.82 11.64-27.17 4.94-4.12 10.47-6.29 16.59-6.53.88 10.82-2.71 20.76-10.64 28.05-3.36 3.12-7.06 5.12-11.18 6.12z"/></svg>
      <div class="progress-track"><div class="progress-bar" id="boot-progress"></div></div>
    </div>

    <div id="home-screen">
      <div class="carousel" id="carousel">
        <div class="page">
          <div class="search-bar glass-panel clickable" data-name="App 資料庫">🔍 App 資料庫</div>
          <div class="widget-2x2 glass-panel clickable" data-name="時鐘"><span style="font-size: 40px; margin:0;">⌚️</span></div>
          <div class="widget-2x2 glass-panel clickable" data-name="行事曆"><div class="calendar-day" id="widget-day">週六</div><div class="calendar-date" id="widget-date">20</div></div>
          <div class="widget-4x2 glass-panel clickable" data-name="天氣"><div style="font-size: 32px; font-weight: 300; letter-spacing:-1px;">內湖區 28°C</div><div style="font-size: 14px; opacity: 0.8; margin-top: 5px;">晴時多雲 · 降雨機率 10%</div></div>
          <div class="app-icon glass-panel clickable" data-name="App Store"><span>🅰️</span>App Store</div>
          <div class="app-icon glass-panel clickable" data-name="地圖"><span>🗺️</span>地圖</div>
          <div class="app-icon glass-panel clickable" data-name="備忘錄"><span>📝</span>備忘錄</div>
          <div class="app-icon glass-panel clickable" data-name="照片"><span>🌺</span>照片</div>
        </div>
        
        <div class="page">
          <div class="widget-4x2 glass-panel clickable photo-widget" data-name="照片">
             <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop" alt="photo" loading="lazy">
          </div>
          <div class="app-icon glass-panel clickable" data-name="YouTube"><span>▶️</span>YouTube</div>
          <div class="app-icon glass-panel clickable" data-name="音樂"><span>🎵</span>音樂</div>
          <div class="app-icon glass-panel clickable" data-name="遊戲"><span>🎮</span>遊戲</div>
          <div class="app-icon glass-panel clickable" data-name="相機"><span>📷</span>相機</div>
        </div>
      </div>
      
      <div class="page-dots" id="dots"><div class="dot active"></div><div class="dot"></div></div>

      <div class="dock-container">
        <div class="dock">
          <div class="app-icon clickable" data-name="電話"><span>📞</span>電話</div>
          <div class="app-icon clickable" data-name="設定"><span>⚙️</span>設定</div>
          <div class="app-icon clickable" data-name="訊息"><span>💬</span>訊息</div>
          <div class="app-icon clickable" data-name="Safari"><span>🧭</span>Safari</div>
        </div>
      </div>
    </div>

    <div id="app-layer">
      <div id="app-header"><h2 id="app-title">App Name</h2></div>
      <div id="app-content"></div>
      <div class="home-indicator-area" id="app-home-area"><div class="home-indicator"></div></div>
    </div>

    <div id="lock-screen-container">
      <div class="date" id="dateDisplay">載入中...</div>
      <h1 class="time" id="clock">--:--</h1>
      <div class="swipe-text" id="swipe-text">向上滑動來解鎖</div>
      <div class="home-indicator-area" id="lock-home-area"><div class="home-indicator"></div></div>
    </div>

  </div>
  
  <script>
    // --- 開機動畫 ---
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => { document.getElementById('boot-progress').style.width = '100%'; }, 100);
      setTimeout(() => {
        const bootScreen = document.getElementById('boot-screen');
        bootScreen.style.opacity = '0';
        setTimeout(() => { bootScreen.style.display = 'none'; }, 800); 
      }, 2600); 
    });

    // --- 時鐘更新 ---
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      document.getElementById('dateDisplay').innerText = now.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', weekday: 'short' });
      const widgetDate = document.getElementById('widget-date');
      const widgetDay = document.getElementById('widget-day');
      if(widgetDate) { widgetDate.innerText = now.getDate(); widgetDay.innerText = now.toLocaleDateString('zh-TW', { weekday: 'short' }); }
    }
    setInterval(updateClock, 1000); updateClock();

    // --- 鎖定畫面解鎖 ---
    const lockContainer = document.getElementById('lock-screen-container');
    let lockStartY = 0, lockIsDragging = false;
    lockContainer.addEventListener('mousedown', (e) => { lockStartY = e.clientY; lockIsDragging = true; lockContainer.style.transition = 'none'; });
    lockContainer.addEventListener('touchstart', (e) => { lockStartY = e.touches[0].clientY; lockIsDragging = true; lockContainer.style.transition = 'none'; }, {passive: true});
    const lockMove = (y) => { if (!lockIsDragging) return; let deltaY = y - lockStartY; if (deltaY < 0) lockContainer.style.transform = `translateY(${deltaY}px)`; };
    window.addEventListener('mousemove', (e) => lockMove(e.clientY));
    window.addEventListener('touchmove', (e) => lockMove(e.touches[0].clientY), {passive: true});
    const lockEnd = (y) => {
      if (!lockIsDragging) return;
      lockIsDragging = false; let deltaY = y - lockStartY;
      lockContainer.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease';
      if (deltaY < -100) { 
        lockContainer.style.transform = 'translateY(-100vh)'; lockContainer.style.opacity = '0'; lockContainer.style.pointerEvents = 'none'; 
        document.getElementById('home-screen').style.opacity = '1'; document.getElementById('home-screen').style.transform = 'scale(1)';
      } else { lockContainer.style.transform = 'translateY(0)'; }
    };
    window.addEventListener('mouseup', (e) => lockEnd(e.clientY));
    window.addEventListener('touchend', (e) => lockEnd(e.changedTouches[0].clientY));

    // --- App 上滑退出 ---
    const appHomeArea = document.getElementById('app-home-area');
    const appLayer = document.getElementById('app-layer');
    let appStartY = 0, appIsDragging = false;
    appHomeArea.addEventListener('mousedown', (e) => { appStartY = e.clientY; appIsDragging = true; appLayer.style.transition = 'none'; });
    appHomeArea.addEventListener('touchstart', (e) => { appStartY = e.touches[0].clientY; appIsDragging = true; appLayer.style.transition = 'none'; }, {passive: true});
    const appMove = (y) => { if (!appIsDragging) return; let deltaY = y - appStartY; if (deltaY < 0) appLayer.style.transform = `translateY(${deltaY}px) scale(0.95)`; };
    window.addEventListener('mousemove', (e) => appMove(e.clientY));
    window.addEventListener('touchmove', (e) => appMove(e.touches[0].clientY), {passive: true});
    const appEnd = (y) => {
      if (!appIsDragging) return;
      appIsDragging = false; let deltaY = y - appStartY;
      appLayer.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease';
      if (deltaY < -50) { 
        appLayer.style.transform = 'translateY(100vh) scale(0.9)'; appLayer.style.opacity = '0'; appLayer.style.pointerEvents = 'none';
      } else { appLayer.style.transform = 'translateY(0) scale(1)'; }
    };
    window.addEventListener('mouseup', (e) => appEnd(e.clientY));
    window.addEventListener('touchend', (e) => appEnd(e.changedTouches[0].clientY));

    // --- 🌟 全部 App 徹底精緻化 ---
    const appTitle = document.getElementById('app-title');
    const appContent = document.getElementById('app-content');

    setTimeout(() => {
      const clickables = document.querySelectorAll('.clickable');
      clickables.forEach(item => {
        item.addEventListener('click', () => {
          const appName = item.getAttribute('data-name');
          appTitle.innerText = appName;
          appContent.style.background = "#f2f2f7"; // 預設背景
          
          if (appName === 'YouTube') {
            appContent.style.background = "#0f0f0f";
            appContent.innerHTML = `<div style="background:#0f0f0f; height:100%; color:white;"><div style="width:100%; height:250px; background:black; display:flex; justify-content:center; align-items:center;"><div style="font-size:60px;">▶️</div></div><div style="padding:15px;"><h3 style="margin:0;">Minecraft 電影版官方預告</h3><p style="color:#aaa; font-size:14px; margin-top:5px;">Warner Bros. · 1,500 萬次觀看</p></div><div style="padding:15px; border-top:1px solid #333;"><div style="display:flex; align-items:center;"><div style="width:40px; height:40px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; font-size:20px;">👤</div><div style="margin-left:15px;"><div style="font-weight:bold;">IGN</div><div style="color:#aaa; font-size:12px;">500萬 位訂閱者</div></div></div></div></div>`;
          } 
          else if (appName === '音樂') {
            appContent.style.background = "linear-gradient(#2b2b2b, #121212)";
            appContent.innerHTML = `<div style="text-align:center; padding-top:40px; height:100%; color:white; padding-bottom:80px; box-sizing:border-box;"><div style="width:280px; height:280px; background:linear-gradient(45deg, #ff9a9e, #fecfef); border-radius:15px; margin:0 auto 30px auto; display:flex; align-items:center; justify-content:center; font-size:80px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);">🎓</div><h2 style="margin:0; font-size:26px;">Memories-608</h2><p style="color:#b3b3b3; margin-top:5px; font-size:16px;">608班畢業專題</p><div style="width: 85%; height: 6px; background: #555; border-radius: 3px; margin: 40px auto 20px auto; position: relative;"><div style="width: 45%; height: 100%; background: white; border-radius: 3px;"></div></div><div style="font-size:40px; margin-top:20px; display:flex; justify-content:space-evenly; align-items:center;"><span>⏮️</span> <span style="font-size:60px;">⏸️</span> <span>⏭️</span></div></div>`;
          } 
          else if (appName === '相機') {
            appContent.style.background = "black";
            appContent.innerHTML = `<div style="background:black; height:100%; display:flex; flex-direction:column; justify-content:space-between; padding-bottom: 90px; box-sizing: border-box;"><div style="height:80px; display:flex; justify-content:space-between; align-items:center; padding:0 25px; color:white; font-size:22px;"><span>⚡️</span><span> HDR</span><span>⏱️</span></div><div style="flex-grow:1; border:1px solid #333; margin:0 2px;"></div><div style="height:120px; display:flex; justify-content:space-evenly; align-items:center; color:white; margin-top:20px;"><div style="width:55px; height:55px; border-radius:12px; background:url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=100') center/cover;"></div><div style="width:75px; height:75px; border-radius:50%; background:white; border:4px solid #aaa;"></div><div style="font-size:35px; background:rgba(255,255,255,0.15); border-radius:50%; padding:10px;">🔄</div></div></div>`;
          } 
          else if (appName === '遊戲') {
            appContent.innerHTML = `<div style="height:100%; background:linear-gradient(#6eb844, #448021); display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; font-family:monospace; padding-bottom: 50px;"><div style="font-size:90px; filter:drop-shadow(0 10px 10px rgba(0,0,0,0.5));">🟫</div><h2 style="margin-top:20px; font-size:35px; letter-spacing:2px; text-shadow: 2px 2px 0 #000;">Minecraft</h2><div style="padding:15px 70px; background:#8a8a8a; border:4px solid #000; margin-top:40px; font-weight:bold; font-size:28px; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3);">PLAY</div></div>`;
          } 
          else if (appName === '電話') {
            appContent.innerHTML = `<div style="padding:20px; background:white; height:100%;"><h1 style="margin-top:0; font-size:32px; letter-spacing:-1px;">通話紀錄</h1><div style="padding:15px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between; font-size:18px; align-items:center;"><strong style="color:red;">爺爺</strong><span style="color:#888; font-size:15px;">昨天 📱</span></div><div style="padding:15px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between; font-size:18px; align-items:center;"><strong>曾祖母</strong><span style="color:#888; font-size:15px;">星期三 📞</span></div></div>`;
          } 
          else if (appName === 'Safari') {

    const carousel = document.getElementById('carousel');
    const dots = document.querySelectorAll('.dot');
    if(carousel && dots.length > 0) {
      carousel.addEventListener('scroll', () => {
        let scrollPosition = carousel.scrollLeft;
        let pageWidth = carousel.clientWidth;
        let currentPage = Math.round(scrollPosition / pageWidth);
        dots.forEach((dot, index) => {
          if(index === currentPage) dot.classList.add('active');
          else dot.classList.remove('active');
        });
      });
    }
